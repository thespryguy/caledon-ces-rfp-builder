<!DOCTYPE html>
<html lang="en">
<head>

<title>Caledon CES RFP Partner Workspace Builder v0.3 — Google Submit</title>
<style>
:root {
  --bg:#f5f7fb; --panel:#ffffff; --ink:#16202e; --muted:#667085; --line:#d9e1ec;
  --hce:#0b4a7a; --hce-soft:#e8f2fb; --mies:#08715d; --mies-soft:#e6f5f1;
  --mantle:#7041a3; --mantle-soft:#f1eafd; --mantle-accent:#d86b1f;
  --bid:#263241; --bid-soft:#edf0f3; --shared:#6b7280; --shared-soft:#f3f4f6;

}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;line-height:1.45}
header{position:sticky;top:0;z-index:50;background:linear-gradient(100deg,#0b3558,#0b4a7a 48%,#263241);color:#fff;padding:14px 20px;border-bottom:4px solid #f59e0b}
.header-inner{display:flex;gap:18px;align-items:center;justify-content:space-between;max-width:1500px;margin:0 auto}
.brand h1{font-size:1.1rem;margin:0 0 3px} .brand p{margin:0;color:#d7e8f8;font-size:.86rem}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.status-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:7px 10px;font-size:.8rem}
.app{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 76px)}
nav{position:sticky;top:76px;height:calc(100vh - 76px);overflow:auto;background:#fff;border-right:1px solid var(--line);padding:14px}
nav button{width:100%;display:flex;gap:10px;align-items:center;text-align:left;border:0;background:transparent;color:#344054;border-radius:12px;padding:11px 12px;margin-bottom:5px;cursor:pointer;font-weight:650}
nav button:hover{background:#f3f7fb} nav button.active{background:#e6f0f8;color:#0b4a7a}
main{padding:22px;max-width:1500px;width:100%;margin:0 auto}
.view{display:none} .view.active{display:block}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
.panel h2{margin:0 0 10px;font-size:1.35rem} .panel h3{margin:16px 0 8px}
.helptext,.muted{color:var(--muted)}
.grid{display:grid;gap:14px} .two{grid-template-columns:repeat(2,minmax(0,1fr))} .three{grid-template-columns:repeat(3,minmax(0,1fr))} .four{grid-template-columns:repeat(4,minmax(0,1fr))}
.cards{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
.role-card{border:2px solid var(--line);border-radius:18px;background:#fff;padding:14px;cursor:pointer;transition:.15s box-shadow,.15s transform,.15s border-color;min-height:118px}
.role-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)} .role-card.active{box-shadow:0 0 0 4px rgba(31,93,143,.16)}
.role-card h3{margin:6px 0 4px;font-size:1rem} .role-card .icon{font-size:1.6rem}
.role-card.hce{border-color:var(--hce)} .role-card.mies{border-color:var(--mies)} .role-card.mantle{border-color:var(--mantle)} .role-card.bid{border-color:var(--bid)} .role-card.shared{border-color:var(--shared)}
.kpi{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff} .kpi strong{display:block;font-size:1.7rem} .kpi span{color:var(--muted);font-size:.9rem}
.progress{height:10px;border-radius:999px;background:#e5e7eb;overflow:hidden} .progress > div{height:100%;background:linear-gradient(90deg,var(--hce),#22c55e)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.chip{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:3px 9px;font-size:.76rem;font-weight:750;border:1px solid transparent}
.chip.hce{background:var(--hce-soft);color:var(--hce);border-color:#b9d6ec} .chip.mies{background:var(--mies-soft);color:var(--mies);border-color:#b9e4d8}
.chip.mantle{background:var(--mantle-soft);color:var(--mantle);border-color:#d7c2f3} .chip.bid{background:var(--bid-soft);color:var(--bid);border-color:#cfd6df}
.chip.shared{background:var(--shared-soft);color:#374151;border-color:#d1d5db} .chip.tbc{background:var(--amber-soft);color:#7a4b00;border-color:#f4cf8a}
.callout{border-left:5px solid var(--hce);background:#f8fbff;border-radius:12px;padding:12px;margin:10px 0} .callout.warn{border-color:var(--amber);background:var(--amber-soft)} .callout.danger{border-color:var(--red);background:var(--red-soft)} .callout.ok{border-color:var(--green);background:var(--green-soft)}
button,.btn{border:0;border-radius:11px;background:#0b4a7a;color:#fff;padding:9px 12px;font-weight:750;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
button.secondary,.btn.secondary{background:#eef2f7;color:#344054;border:1px solid #d0d5dd} button.green{background:var(--green)} button.purple{background:var(--mantle)} button.red{background:var(--red)} button.small{padding:6px 8px;font-size:.78rem}
button:focus,input:focus,textarea:focus,select:focus{outline:3px solid rgba(11,74,122,.25);outline-offset:2px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0}
label{font-size:.82rem;font-weight:750;color:#344054;display:block;margin-bottom:5px}
input,textarea,select{width:100%;border:1px solid #cfd6df;border-radius:10px;padding:9px;background:#fff;color:#111827;font:inherit}
textarea{min-height:92px;resize:vertical} textarea.big{min-height:340px} textarea.medium{min-height:160px}
.field-card{border:1px solid var(--line);border-radius:16px;background:#fff;padding:14px;margin-bottom:14px}
.field-card.hce{border-left:6px solid var(--hce)} .field-card.mies{border-left:6px solid var(--mies)} .field-card.mantle{border-left:6px solid var(--mantle)} .field-card.bid{border-left:6px solid var(--bid)} .field-card.shared{border-left:6px solid var(--shared)}
.reference-card-grid{display:grid;gap:14px}
.pricing-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:12px 0}
.pricing-summary .kpi{min-height:94px}
.pricing-build-table td input,.pricing-build-table td select,.pricing-build-table td textarea{min-width:120px}
.readonly-cell{color:var(--muted);font-size:.9rem;min-width:170px}
.meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:.82rem;margin:6px 0}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden} th,td{border:1px solid var(--line);padding:8px;vertical-align:top;text-align:left} th{background:#f0f4f8;font-size:.82rem} td input,td textarea,td select{min-width:130px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px} .tabs button{background:#eef2f7;color:#344054} .tabs button.active{background:#0b4a7a;color:#fff}
.okText{color:var(--green);font-weight:800} .warnText{color:var(--amber);font-weight:800} .dangerText{color:var(--red);font-weight:800}
.footer-note{font-size:.82rem;color:var(--muted);margin-top:16px}
.hidden{display:none!important}

.submit-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.submission-banner{border:1px solid #f4cf8a;background:#fff8e8;border-left:6px solid var(--amber);border-radius:14px;padding:12px;margin:10px 0}
.submission-banner.ready{background:#e8f7ef;border-color:#9bd4b6;border-left-color:var(--green)}
.codebox{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#0b1220;color:#e6edf3;border-radius:12px;padding:10px;overflow:auto;white-space:pre-wrap}
@media(max-width:1100px){.submit-grid{grid-template-columns:1fr}}
@media(max-width:1100px){.app{grid-template-columns:1fr} nav{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line);display:grid;grid-template-columns:repeat(2,1fr);gap:6px} .cards,.four,.three,.two,.pricing-summary{grid-template-columns:1fr} .header-inner{display:block}}
@media print{header,nav,.toolbar,.role-card button,.no-print{display:none!important} .app{display:block} main{padding:0} .panel{box-shadow:none;border:1px solid #ddd;break-inside:avoid}}
</style>
</head>

      "title": "Section 1 — Company Profile",

      "exclude": "Pricing; hourly rates; internal dashboards; action-ID tables; unconfirmed partner claims; references to unconfirmed project partners as confirmed delivery entities.",
      "body": "[PROPOSAL-FACING DRAFT]\n\nHCE is proposed as the prime consultant and final integration lead for the Caledon Community Energy Systems Study. HCE brings a municipally rooted infrastructure and energy perspective, combining public-sector operating discipline with practical experience in energy systems, telecommunications, stakeholder coordination and implementation planning.\n\nFor this assignment, HCE’s value is not limited to analysis. HCE brings the perspective of a municipal implementation partner that understands how technical recommendations must be translated into ownership models, operating responsibilities, funding pathways, customer adoption strategies, utility coordination and phased delivery plans.\n\nHCE’s direct energy evidence is anchored by the 2025 Hamilton Energy Harvesting Feasibility Study. The study was led by HCE from January 2023 through December 2024 and examined the viability of harvesting waste heat from Hamilton’s Bayfront Industrial Area as a fuel source for an expanded low-carbon district energy system serving downtown Hamilton and beyond. The study advanced a five-phase corridor district energy concept with estimated annual heating demand of 143,000 MWh, peak demand of 51 MW, annual GHG reductions of more than 27,000 tonnes, and an approximately 80% reduction versus business-as-usual fossil fuel heating.\n\n[HCE | REQUIRED BEFORE FINAL: confirm permission to use the Energy Harvesting Study as formal reference/evidence and approve exact wording.]\n\nHCE will coordinate specialist partners, manage project controls, integrate deliverables, and ensure that the final study is practical for Town staff, utilities, developers, major energy users and decision-makers.",

      "filename": "02_References_Comparable_Projects_HCE_Caledon_CES",
      "owners": [

      "purpose": "Explain why the selected references demonstrate relevant capability for Caledon’s CES Study.",

      "responsibilities": "HCE will confirm formal reference permissions and coordinate partner reference inputs. MIES and Mantle must confirm whether they will provide references.",
      "support": "The Town requires three mandatory references in the portal. This upload should explain relevance while the portal form captures required reference fields.",

      "exclude": "Unsupported candidate references; incomplete contact data in proposal-facing text; unapproved project values; pricing; internal notes.",
      "body": "[PROPOSAL-FACING DRAFT]\n\nThe reference projects will be selected to demonstrate the capabilities required for Caledon’s Community Energy Systems Study: municipal energy implementation, district energy and waste heat recovery, technical and commercial feasibility, GIS-enabled demand/source mapping, stakeholder coordination, and implementation planning.\n\nProposed Reference 1 — HCE Energy Harvesting Feasibility Study [TO BE CONFIRMED]\nThe 2025 Hamilton Energy Harvesting Feasibility Study is proposed as HCE’s primary energy and district energy reference, subject to HCE approval and reference contact confirmation. The study examined the feasibility of harvesting waste heat from Hamilton’s Bayfront Industrial Area to support an expanded district energy system. It demonstrates HCE’s ability to lead a multi-stakeholder, FCM-supported, implementation-oriented energy study with commercial, technical, governance and funding dimensions.\n\nProposed Reference 2 — MIES reference [TO BE CONFIRMED]\nMIES is requested to provide a reference demonstrating energy modelling, hourly electric/thermal demand analysis, geospatial energy demand analysis, community energy planning, or related municipal/utility-facing work.\n\nProposed Reference 3 — Mantle Climate reference [TO BE CONFIRMED]\nMantle is requested to confirm whether it will provide a reference relevant to climate policy, CES solutions analysis, scenario analysis, climate risk/resilience, FCM/NZT alignment, or grid/energy strategy.\n\n[REQUIRED BEFORE FINAL: Three portal-ready references must be completed with contact details, dates, scope, project value, permission to cite, and relevance to Caledon.]",

      "responsibilities": "HCE primes and integrates. MIES leads/supports modelling, data and thermal-electric analysis. Mantle leads Task 3 solutions/scenario analysis and supports policy, FCM/NZT, engagement and governance workstreams.",
      "support": "The team must prove it can produce the Opportunity Atlas, solutions analysis, stakeholder support and implementation roadmap without overcomplicating delivery.",
      "include": "Organization chart narrative; role cards; responsibility matrix; backup strategy; partner interfaces; staff/resume placeholders; conflict status placeholders.",
      "exclude": "Pricing; hourly rates; unconfirmed partners presented as confirmed; internal action dashboards.",
      "body": "[PROPOSAL-FACING DRAFT]\n\nThe proposed project team is organized around a clear prime-and-specialist model. HCE will serve as prime consultant, municipal implementation lead and final integrator. HCE will manage project governance, partner coordination, utility coordination support, quality assurance and final deliverable integration.\n\nHCE role card\n• Prime consultant and single point of accountability\n• Project governance and quality control\n• Municipal operator lens\n• Utility coordination support\n• District energy / implementation perspective\n• Final integration and QA\n• HCE Energy Harvesting reference/evidence owner\n\nMIES role card\n• Data collection and processing support\n• Natural gas and electricity data requirements\n• Weather, LiDAR, building footprint, archetype and development data assumptions\n• Hourly heat and electricity demand modelling\n• Geospatial heat load and carbon-free heat source mapping support\n• Thermal scenario analysis\n• Support for district energy / thermal network feasibility screening\n\nMantle Climate role card\n• Task 3 lead for solutions overview\n• Electricity demand and solutions analysis\n• CES options matrix\n• Scenario analysis\n• Climate risk and resilience lens\n• FCM/NZT alignment\n• Stakeholder engagement support\n• PESTLE / policy / financing / governance support\n\n[TO BE CONFIRMED: final legal names, staff names, resumes, years of experience, rates, workshare percentages and conflict declarations for all assigned staff and subcontractors.]",

function structuredCloneSafe(obj){ return JSON.parse(JSON.stringify(obj)); }
function deepMerge(target, source){
  if(!source || typeof source !== 'object') return target;
  for(const key of Object.keys(source)){
    if(Array.isArray(source[key])) target[key] = source[key];
    else if(source[key] && typeof source[key] === 'object') target[key] = deepMerge(target[key] || {}, source[key]);
    else target[key] = source[key];
  }
  return target;
}
function loadState(){
  const saved = localStorage.getItem('caledonPartnerWorkspaceV03') || localStorage.getItem('caledonPartnerWorkspaceV02');
  if(saved){ try { const loaded = deepMerge(structuredCloneSafe(DEFAULT_DATA), JSON.parse(saved)); loaded.version = WORKSPACE_VERSION; return loaded; } catch(e){ return structuredCloneSafe(DEFAULT_DATA); } }
  return structuredCloneSafe(DEFAULT_DATA);
}
function saveState(toast=false){
  state.lastSaved = new Date().toLocaleString();
  localStorage.setItem('caledonPartnerWorkspaceV03', JSON.stringify(state));
  document.getElementById('savePill').textContent = 'Saved: ' + state.lastSaved;
  if(toast) alert('Workspace saved locally in this browser.');
}

function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function roleKey(label){
  const x = String(label||'').toLowerCase();
  if(x.includes('hce')) return 'hce'; if(x.includes('mies')) return 'mies'; if(x.includes('mantle')) return 'mantle'; if(x.includes('bid')||x.includes('commercial')||x.includes('compliance')) return 'bid'; if(x.includes('shared')) return 'shared'; return 'tbc';
}
function ownerMatches(owners, role){
  if(role === 'all') return true;
  owners = Array.isArray(owners) ? owners : [owners];
  return owners.some(o => roleKey(o) === role || roleKey(o) === 'shared');
}
function ownerChips(owners){
  owners = Array.isArray(owners) ? owners : [owners];
  return `<div class="chips">${owners.map(o => `<span class="chip ${roleKey(o)}">${escapeHtml(o)}</span>`).join('')}</div>`;
}
function itemOwnerClass(owners){
  owners = Array.isArray(owners) ? owners : [owners];
  if(owners.some(o=>roleKey(o)==='hce')) return 'hce';
  if(owners.some(o=>roleKey(o)==='mies')) return 'mies';
  if(owners.some(o=>roleKey(o)==='mantle')) return 'mantle';
  if(owners.some(o=>roleKey(o)==='bid')) return 'bid';

}

function statusClass(status){
  const s = String(status||'').toLowerCase();
  if(s.includes('final')||s.includes('ready')||s.includes('complete')||s.includes('pass')) return 'okText';
  if(s.includes('critical')||s.includes('required')||s.includes('fail')||s.includes('not ready')) return 'dangerText';
  if(s.includes('tbc')||s.includes('draft')||s.includes('progress')||s.includes('open')) return 'warnText';

}

function navInit(){
  document.querySelectorAll('nav button').forEach(btn => btn.addEventListener('click', () => showView(btn.dataset.view)));
}
function showView(id){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.view===id));
}
function roleCards(){
  return `<div class="cards">${Object.entries(state.roles).map(([key,r]) => `<div class="role-card ${r.color} ${state.selectedRole===key?'active':''}" onclick="setRole('${key}')" tabindex="0" role="button" aria-label="Select role ${escapeHtml(r.label)}"><div class="icon">${r.icon}</div><h3>${escapeHtml(r.label)}</h3><p class="muted">${escapeHtml(r.subtitle)}</p></div>`).join('')}</div>`;
}
function getVisibleSections(){ return Object.entries(state.sections).filter(([k,s]) => ownerMatches(s.owners, state.selectedRole)); }
function getVisibleFields(){ return state.partnerFields.filter(f => ownerMatches(f.owners, state.selectedRole)); }
function missingFields(fields=getVisibleFields()){ return fields.filter(f => f.required && /to be confirmed|tbc|required before final|not started/i.test((f.text||'')+' '+(f.status||''))); }
function completionStats(){
  const sections = Object.values(state.sections);
  const finalSections = sections.filter(s => /ready|final|complete/i.test(s.status)).length;
  const fields = state.partnerFields;
  const completeFields = fields.filter(f => /ready|final|complete/i.test(f.status)).length;
  const refsReady = state.portalForms.references.filter(r => !/to be confirmed|tbc|not ready/i.test(Object.values(r).join(' '))).length;
  const subPct = totalSubPct();
  const qa = scanAll();
  return {sections, finalSections, fields, completeFields, refsReady, subPct, qa};
}
function kpi(label, value, pct){ return `<div class="kpi"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(label)}</span><div class="progress" aria-label="${escapeHtml(label)}"><div style="width:${Math.max(0,Math.min(100,pct||0))}%"></div></div></div>`; }
function endpointReady(){ return !!(SUBMISSION_ENABLED && SUBMISSION_ENDPOINT && !SUBMISSION_ENDPOINT.includes('PASTE GOOGLE APPS SCRIPT')); }

    <div class="toolbar"><button onclick="submitToCoordinator()">Submit to Coordinator</button><button class="secondary" onclick="exportJson()">Export JSON Backup</button></div>

function validateSubmission(){
  const s=state.submission||{}; const missing=[];
  if(!endpointReady()) missing.push('Coordinator endpoint is not configured. Set SUBMISSION_ENDPOINT and SUBMISSION_ENABLED in the HTML file.');
  if(!s.reviewerName) missing.push('Reviewer name');
  if(!s.reviewerEmail) missing.push('Reviewer email');
  if(!s.organization) missing.push('Organization / partner company');
  if(!s.role) missing.push('Submission role');
  if(!s.consent) missing.push('Consent checkbox');
  return missing;
}
function currentSectionStatuses(){
  const out={}; Object.entries(state.sections||{}).forEach(([k,v])=>out[k]={title:v.title,status:v.status,owners:v.owners,words:wordCount(v.body)}); return out;
}
function laneState(role){
  const normalized = role==='Bid-Commercial-Compliance' ? 'bid' : roleKey(role || state.selectedRole);
  const sectionEntries = Object.entries(state.sections||{}).filter(([k,s])=>ownerMatches(s.owners, normalized));
  const partnerFields = (state.partnerFields||[]).filter(f=>ownerMatches(f.owners, normalized));
  const portalForms = {};
  Object.entries(state.portalForms||{}).forEach(([key,rows])=>{
    portalForms[key] = (rows||[]).filter(r => !r.owner || ownerMatches(r.owner, normalized) || normalized==='all');
  });
  return {
    role: normalized,
    roleLabel: state.roles[normalized]?.label || role || currentRoleLabel(),
    sections: Object.fromEntries(sectionEntries),
    partnerFields,
    portalForms,
    pricingWorkshareInputs: { subcontractorPercentTotal: totalSubPct(), relevantSubcontractorRows: portalForms.subcontractors || [] },
    qaResults: scanAll()
  };
}
function buildSubmissionPayload(){
  const s=state.submission||{};
  const scope=s.payloadScope||'lane';
  const role=s.role||currentRoleLabel();
  const lane = laneState(role);
  return {
    workspaceVersion: WORKSPACE_VERSION,
    submittedAt: new Date().toISOString(),
    reviewerName: s.reviewerName||'',
    reviewerEmail: s.reviewerEmail||'',
    organization: s.organization||'',
    role: role,
    submissionStatus: s.submissionStatus||'Draft',
    notes: s.notes||'',
    selectedRole: state.selectedRole,
    payloadScope: scope,
    sectionStatuses: currentSectionStatuses(),
    laneState: lane,
    partnerInputs: scope==='full' ? state.partnerFields : lane.partnerFields,
    portalForms: scope==='full' ? state.portalForms : lane.portalForms,
    pricingBuild: state.pricingBuild || defaultPricingBuild(),
    pricingWorkshareInputs: { subcontractorPercentTotal: totalSubPct(), pricingRows: state.portalForms.pricing, subcontractorRows: state.portalForms.subcontractors },
    qaResults: scanAll(),
    fullState: scope==='full' ? state : null,
    submissionSecret: SUBMISSION_SECRET || ''
  };
}
async function submitToCoordinator(){
  const missing=validateSubmission();
  if(missing.length){ alert('Cannot submit yet:\n- '+missing.join('\n- ')); return; }
  const role=state.submission.role || currentRoleLabel();
  if(!confirm(`Submit ${state.submission.payloadScope==='full'?'the full workspace':'your selected partner lane'} for ${role} to the bid coordinator?`)) return;
  const payload=buildSubmissionPayload();
  try{
    const res=await fetch(SUBMISSION_ENDPOINT,{method:'POST', body: JSON.stringify(payload)});
    const text=await res.text(); let data;
    try{ data=JSON.parse(text); } catch(e){ data={success:res.ok,message:text}; }
    if(!res.ok || data.success===false) throw new Error(data.message || ('HTTP '+res.status));
    state.lastSubmittedAt = new Date().toLocaleString();
    state.submission.lastSubmissionRole = role;
    state.submission.lastSubmissionStatus = state.submission.submissionStatus;
    state.submission.lastSubmissionId = data.submissionId || 'received';
    state.submission.lastSubmissionMessage = data.message || 'Submission received.';
    saveState(); renderAll();
    alert('Submission received by coordinator. Please also export a JSON backup and save it to the shared bid folder or email it to the bid coordinator.');
  }catch(err){
    state.submission.lastSubmissionMessage = 'Submission failed: '+err.message;
    saveState(); renderAll();
    alert('Submission failed. Local save still exists. Export a JSON backup as fallback.\n\nError: '+err.message);
  }
}
function coordinatorImportPanel(){
  const mode=state.submission?.importMergeMode||'append';
  return `<div class="panel"><h2>Coordinator Import Helper</h2><p class="helptext">Paste a submitted JSON payload from the Google Sheet or a partner JSON backup, then merge it into this workspace. This is intended for Glen / bid manager use.</p>
    <div class="grid two"><div><label>Merge mode</label><select data-path="submission.importMergeMode"><option value="keep" ${mode==='keep'?'selected':''}>keep</option><option value="replace" ${mode==='replace'?'selected':''}>replace</option><option value="append" ${mode==='append'?'selected':''}>append</option></select></div><div><label>What merge modes mean</label><p class="muted">keep = do not overwrite current content; replace = imported content replaces matching IDs; append = imported content is appended as notes where possible.</p></div></div>
    <label>Paste submitted JSON</label><textarea id="coordinatorImportJson" class="medium" placeholder="Paste payload JSON from Google Sheet or partner backup here."></textarea>
    <div class="toolbar"><button onclick="importSubmittedJson()">Import / Merge Submitted JSON</button></div>
  </div>`;
}
function importSubmittedJson(){
  const raw=document.getElementById('coordinatorImportJson')?.value||'';
  if(!raw.trim()){ alert('Paste submitted JSON first.'); return; }
  let payload; try{ payload=JSON.parse(raw); } catch(e){ alert('Invalid JSON.'); return; }
  const meta = payload.reviewerName ? `${payload.reviewerName} (${payload.organization||'organization unknown'}, ${payload.role||'role unknown'})` : 'submitted payload';
  if(!confirm(`Import ${meta}? Existing content will be handled using merge mode: ${state.submission.importMergeMode}.`)) return;
  const mode=state.submission.importMergeMode||'append';
  const source = payload.fullState || payload.laneState || payload;
  if(mode==='keep'){ alert('Merge mode is keep. No current content was overwritten.'); return; }
  if(mode==='replace' && payload.fullState){ state=deepMerge(structuredCloneSafe(DEFAULT_DATA), payload.fullState); saveState(); renderAll(); alert('Full workspace replaced from submitted payload.'); return; }
  const incomingFields = source.partnerFields || payload.partnerInputs || [];
  incomingFields.forEach(f=>{
    const idx=(state.partnerFields||[]).findIndex(x=>x.id===f.id);
    if(idx>=0){
      if(mode==='replace') state.partnerFields[idx]=deepMerge(state.partnerFields[idx], f);
      else if(mode==='append') state.partnerFields[idx].text = `${state.partnerFields[idx].text||''}\n\n[Imported from ${meta} at ${new Date().toLocaleString()}]\n${f.text||''}`;
    } else state.partnerFields.push(f);
  });
  const incomingSections = source.sections || {};
  Object.entries(incomingSections).forEach(([k,s])=>{
    if(state.sections[k]){
      if(mode==='replace') state.sections[k]=deepMerge(state.sections[k], s);
      else if(mode==='append') state.sections[k].body = `${state.sections[k].body||''}\n\n[Imported from ${meta} at ${new Date().toLocaleString()}]\n${s.body||''}`;
    } else state.sections[k]=s;
  });
  saveState(); renderAll(); alert('Partner submission imported. Review appended/replaced content before compiling.');
}

  const visible = getVisibleSections();
  if(!visible.find(([k])=>k===selectedSection) && visible.length) selectedSection = visible[0][0];

  document.getElementById('sections').innerHTML = `<div class="panel"><h2>Five Upload Sections</h2><div class="callout warn"><strong>No-fee rule:</strong> Sections 1–5 must not include prices, hourly rates, task prices or fee language.</div><div class="tabs">${tabs}</div>${s?sectionEditor(selectedSection,s):'<p>No section visible for selected role.</p>'}</div>`;
  updateCounters();
}

function textareaField(label,path,value,size=''){ return `<div><label>${escapeHtml(label)}</label><textarea class="${size}" data-path="${path}">${escapeHtml(value)}</textarea></div>`; }
function selectOptions(opts, selected){ return opts.map(o=>`<option ${o===selected?'selected':''}>${escapeHtml(o)}</option>`).join(''); }
function resetSection(key){ if(confirm('Reset this section to the v0.2 pre-filled draft?')){ state.sections[key] = structuredCloneSafe(DEFAULT_DATA.sections[key]); saveState(); renderSections(); } }
function markSectionReady(key){ state.sections[key].status='Ready for QA'; saveState(); renderSections(); renderDashboard(); }
function updateCounters(){ Object.entries(state.sections).forEach(([k,s]) => { const el=document.getElementById('count-'+k); if(el) el.textContent = `${wordCount(s.body)} words · ${String(s.body||'').length} characters`; }); }
function wordCount(t){ return (String(t||'').trim().match(/\S+/g)||[]).length; }

function fieldEditor(f){ const i = state.partnerFields.findIndex(x=>x.id===f.id); return `<div id="field-${f.id}" class="field-card ${itemOwnerClass(f.owners)}"><h3>${escapeHtml(f.label)}</h3>${ownerChips(f.owners)}<div class="meta"><span>Source: ${escapeHtml(f.source)}</span><span>Required: ${f.required?'Yes':'No'}</span></div><div class="grid two"><div><label>Status</label><select data-path="partnerFields.${i}.status">${selectOptions(['Not started','Drafting','Partner review','Ready for QA','Final'],f.status)}</select></div><div><label>Source label</label><input data-path="partnerFields.${i}.source" value="${escapeHtml(f.source)}"></div></div><label>Partner input / draft content</label><textarea class="medium" data-path="partnerFields.${i}.text">${escapeHtml(f.text)}</textarea><div class="toolbar"><button class="small" onclick="copyToClipboard(state.partnerFields[${i}].text)">Copy</button><button class="small secondary" onclick="resetField('${f.id}')">Reset to pre-fill</button><button class="small green" onclick="markFieldReady('${f.id}')">Mark ready for QA</button></div><div class="meta"><span>${wordCount(f.text)} words</span></div></div>`; }

function renderForms(){

function formTitle(k){ return ({bidSubmission:'Bid Submission', pricing:'Price Schedule A', hourly:'Hourly Rates', references:'Mandatory References', subcontractors:'Subcontractors', addenda:'Addenda / Upload'})[k] || k; }
function formTable(k){ const rows = state.portalForms[k]||[]; if(!rows.length) return '<p>No rows.</p>'; const cols = Object.keys(rows[0]); return `<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${escapeHtml(c)}</th>`).join('')}</tr></thead><tbody>${rows.map((r,i)=>`<tr>${cols.map(c=>`<td>${formCell(k,i,c,r[c])}</td>`).join('')}</tr>`).join('')}</tbody></table></div><div class="toolbar"><button class="small secondary" onclick="addFormRow('${k}')">Add row</button><button class="small" onclick="exportPortalSummary()">Export portal summary</button></div>`; }
function formCell(k,i,c,v){ if(c==='owner') return ownerChips(v); if(typeof v === 'boolean') return `<select data-path="portalForms.${k}.${i}.${c}"><option ${v?'selected':''}>true</option><option ${!v?'selected':''}>false</option></select>`; if(String(v).length>45 || c==='type') return `<textarea data-path="portalForms.${k}.${i}.${c}">${escapeHtml(v)}</textarea>`; return `<input data-path="portalForms.${k}.${i}.${c}" value="${escapeHtml(v)}">`; }
function addFormRow(k){ const rows=state.portalForms[k]; if(!rows || !rows.length) return; const blank={}; Object.keys(rows[0]).forEach(c=>blank[c]=''); rows.push(blank); saveState(); renderForms(); }
function ensureReferenceRows(){
  const defaults = DEFAULT_DATA.portalForms.references;
  const rows = state.portalForms.references || (state.portalForms.references = []);
  while(rows.length < 3) rows.push(structuredCloneSafe(defaults[rows.length]));

function numericMoney(value){
  const cleaned = String(value ?? '').replace(/,/g,'').replace(/[^0-9.-]/g,'');
  const n = parseFloat(cleaned);
  return Number.isFinite(n) ? n : 0;
}
function hasNumericValue(value){ return String(value ?? '').trim() !== '' && Number.isFinite(parseFloat(String(value).replace(/,/g,'').replace(/[^0-9.-]/g,''))); }
function money(n){ return '$' + (Number.isFinite(n) ? n : 0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function pct(n){ return (Number.isFinite(n) ? n : 0).toFixed(1) + '%'; }
function pricingAllocationTotal(allocation){ return numericMoney(allocation.rate) * numericMoney(allocation.hours); }
function calculatedTaskTotals(){
  const totals = {};
  (state.portalForms.pricing||[]).forEach(t => totals[t.line] = 0);
  ensurePricingBuild().taskAllocations.forEach(a => { totals[a.taskLine] = (totals[a.taskLine] || 0) + pricingAllocationTotal(a); });
  return totals;
}
function displayedTaskPrice(line){
  const totals = calculatedTaskTotals();
  const override = ensurePricingBuild().overrides[line] || {};
  return override.enabled ? numericMoney(override.manualPrice) : (totals[line] || 0);
}
function partnerTotals(){
  const totals = {HCE:0,MIES:0,Mantle:0,Other:0};
  ensurePricingBuild().taskAllocations.forEach(a => {
    const key = ['HCE','MIES','Mantle'].includes(a.partner) ? a.partner : 'Other';
    totals[key] += pricingAllocationTotal(a);
  });
  return totals;
}
function workshareSummary(){
  const partner = partnerTotals();
  const total = (state.portalForms.pricing||[]).reduce((sum,t)=>sum+displayedTaskPrice(t.line),0);
  const subcontractor = partner.MIES + partner.Mantle + partner.Other;
  return {partner,total,subcontractor,hceShare:total?partner.HCE/total*100:0,subShare:total?subcontractor/total*100:0};
}
function pricingWarnings(){
  const build = ensurePricingBuild();
  const summary = workshareSummary();
  const warnings = [];
  const missing = build.taskAllocations.filter(a => !hasNumericValue(a.rate) || !hasNumericValue(a.hours));
  if(missing.length) warnings.push(`${missing.length} allocation row(s) have missing or non-numeric rates/hours and calculate as $0 until completed.`);
  if(summary.total > 0 && summary.subShare >= 50) warnings.push(`Subcontractor share is ${pct(summary.subShare)}, at or above the 50% cap.`);
  if(summary.total > 0 && summary.hceShare < 51) warnings.push(`HCE share is ${pct(summary.hceShare)}, below the 51% prime-control target.`);
  Object.entries(build.overrides).forEach(([line,o]) => { if(o.enabled && !String(o.reason||'').trim()) warnings.push(`${line} override is enabled without an override reason.`); });
  return warnings;
}

function scanAll(){
  const technical = Object.values(state.sections).map(s=>s.title+'\n'+s.body+'\n'+s.purpose+'\n'+s.evidence).join('\n');
  const prohibited = ['Rathco','RATHCO','Ecosystem','Ecosystem Energy','Ecosystem Energie','Ecosystem Énergie','Ecosystème'];
  const feeTerms = ['hourly rate','hourly rates','fee','fees','price','pricing','lump sum','dollar amount'];
  const pHits = prohibited.filter(t => new RegExp(t,'i').test(technical));
  const fHits = feeTerms.filter(t => new RegExp(t,'i').test(technical));
  const missingRefs = state.portalForms.references.filter(r => /to be confirmed|tbc|not ready/i.test(Object.values(r).join(' '))).length;
  const missingSub = state.portalForms.subcontractors.filter(r => !r.value || !r.pct || /to be confirmed|tbc/i.test(Object.values(r).join(' '))).length;
  const missingRates = state.portalForms.hourly.filter(r => !r.name || !r.rate || /to be confirmed|tbc/i.test(Object.values(r).join(' '))).length;
  const subPct = totalSubPct();

  html.push(`<p>${fHits.length ? '<span class="warnText">Potential fee/pricing terms found in technical sections:</span> '+fHits.map(escapeHtml).join(', ') : '<span class="okText">No fee/pricing terms found in technical sections.</span>'}</p>`);
  html.push(`<p>${subPct >= 50 ? '<span class="dangerText">Subcontractor percentage is at/above 50%.</span>' : '<span class="okText">Subcontractor percentage below 50% based on entered percentages.</span>'} Current total: ${subPct.toFixed(1)}%.</p>`);
  html.push(`<p>${missingRefs ? '<span class="warnText">Mandatory references incomplete:</span> '+missingRefs+' of 3 need fields.' : '<span class="okText">Mandatory references appear populated.</span>'}</p>`);

  return {summaryHtml:html.join(''), detailHtml:`<div class="callout">${html.join('')}</div>`};

function importBackup(event){ const file=event.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{ try{ state=deepMerge(structuredCloneSafe(DEFAULT_DATA), JSON.parse(reader.result)); saveState(); renderAll(); alert('Backup imported.'); } catch(e){ alert('Import failed: invalid JSON.'); } }; reader.readAsText(file); }
function renderHelp(){ document.getElementById('help').innerHTML = `<div class="panel"><h2>How-To Guide</h2><div class="callout ok"><strong>Partner guide:</strong> Open the full plain-English guide for partner roles, the 7-step workflow, what goes where, quality rules, coordinator checklist and troubleshooting.<br><br><a class="btn" href="HOW_TO_GUIDE.html" target="_blank" rel="noopener">Open full How-To Guide</a></div><h3>Quick workflow</h3><ol><li>Select your role on the Dashboard.</li><li>Open My Focus to see your assigned sections and missing inputs.</li><li>Edit your Partner Workspace fields and relevant upload sections.</li><li>Keep pricing out of Sections 1–5.</li><li>Run QA checks.</li><li>Submit to Coordinator when ready.</li><li>Export your JSON backup as the portable fallback.</li></ol><div class="callout"><strong>Confirmed partners:</strong> HCE, MIES and Mantle. GIS/platform and separate DE/CES specialist are unassigned/TBC risks only.</div><h3>Submission notes</h3><ul><li>Local save stays in the user’s browser.</li><li>Submit to Coordinator sends a copy to the configured Google Sheet.</li><li>JSON backup is the portable fallback.</li><li>GitHub Pages hosts the page but does not store submissions.</li><li>The Google Sheet is the central response log after setup.</li></ul></div>`; }
function wordHtml(title,body){ return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${escapeHtml(title)}</title><style>body{font-family:Arial,sans-serif;line-height:1.45;color:#111827} h1{color:#0b3558} h2{color:#1f5d8f;border-bottom:1px solid #d7dde8;padding-bottom:4px} table{border-collapse:collapse;width:100%;margin:10px 0} th,td{border:1px solid #cdd5df;padding:7px;vertical-align:top} th{background:#eef2f7} .cover{page-break-after:always;margin-top:60px}</style></head><body>${body}</body></html>`; }
function arrayTable(arr){ if(!arr||!arr.length) return '<p>No rows.</p>'; const cols=Object.keys(arr[0]); return `<table><thead><tr>${cols.map(c=>`<th>${escapeHtml(c)}</th>`).join('')}</tr></thead><tbody>${arr.map(r=>`<tr>${cols.map(c=>`<td>${escapeHtml(Array.isArray(r[c])?r[c].join(', '):(r[c]??''))}</td>`).join('')}</tr>`).join('')}</tbody></table>`; }
function download(filename, content, type='text/html'){ const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }
function copyToClipboard(text){ navigator.clipboard.writeText(text||'').then(()=>alert('Copied to clipboard.')).catch(()=>alert('Copy failed.')); }
function updateDynamicMetrics(){ document.getElementById('currentRolePill').textContent='Role: '+currentRoleLabel(); updateCounters(); }
function renderAll(){ renderDashboard(); renderFocus(); renderSections(); renderPartners(); renderForms(); renderPricing(); renderQA(); renderExport(); renderSubmission(); renderBackup(); renderHelp(); updateDynamicMetrics(); }
navInit();
renderAll();
</script>
